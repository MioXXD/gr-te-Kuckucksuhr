          - heading "Vier Welten unter einem Dach" [level=2] [ref=e56]
          - paragraph [ref=e57]: Die meisten Juweliere kennen Gold. Wir kennen Gold und Silber — und das Gestein, aus dem die Erde gemacht ist. Vier Sammlungen, eine Adresse.
