        - paragraph [ref=e60]: Hochauflösende Ganzkörperfotografie dokumentiert jeden Leberfleck. Ein KI-System erkennt Veränderungen zwischen zwei Untersuchungen — Präzision, die das bloße Auge nicht leisten kann.
