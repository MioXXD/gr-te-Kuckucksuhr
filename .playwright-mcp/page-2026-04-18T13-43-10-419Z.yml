        - heading "Hautarzt — mit Zeit und Technik." [level=2] [ref=e48]:
          - text: Hautarzt —
          - emphasis [ref=e49]: mit Zeit und Technik.
      - generic [ref=e50]:
        - paragraph [ref=e51]: Die Dermatologie im FOQUS Fellbach steht für gründliche Abklärung, evidenzbasierte Therapie und offene Kommunikation. Von der präventiven Hautkrebsvorsorge bis zur langfristigen Begleitung chronischer Erkrankungen wie Psoriasis oder Neurodermitis.
        - paragraph [ref=e52]: Besonders am Herzen liegt uns die Schnittstelle zur Augenheilkunde — weil viele Hautbefunde (Rosazea, Xanthelasmen, Lidveränderungen) auch das Auge betreffen und umgekehrt.
    - generic [ref=e55]:
