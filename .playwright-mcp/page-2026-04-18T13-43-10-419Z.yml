        - emphasis [ref=e38]: Haut.
      - paragraph [ref=e39]: Medizinische Dermatologie von der Vorsorge bis zur chronischen Versorgung. Hautkrebsvorsorge mit KI-gestütztem Total Body Mapping, Allergologie, entzündliche Hauterkrankungen und funktionelle Botulinumtoxin-Therapien — alles unter einem Dach.
