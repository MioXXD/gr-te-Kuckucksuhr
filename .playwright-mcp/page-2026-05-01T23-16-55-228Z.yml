          - generic [ref=e92]: § I
          - heading "Vier Welten unter einem Dach" [level=2] [ref=e93]
          - paragraph [ref=e94]: Die meisten Juweliere kennen Gold. Wir kennen Gold und Silber — und das Gestein, aus dem die Erde gemacht ist. Vier Sammlungen, eine Adresse.
