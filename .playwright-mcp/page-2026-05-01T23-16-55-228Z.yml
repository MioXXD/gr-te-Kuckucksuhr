        - heading "Wir behandeln jeden Stein, als wäre er das einzige Exemplar seiner Art." [level=2] [ref=e83]:
          - text: Wir behandeln jeden Stein, als wäre er
          - emphasis [ref=e84]: das einzige Exemplar
          - text: seiner Art.
        - generic [ref=e85]:
          - paragraph [ref=e86]:
            - text: Inge Griss hat das Studio in einer Zeit gegründet, als Mineralogie noch Wunderkammer hieß. Diese Haltung haben wir nie verloren. Bei uns gibt es keine Ware von der Stange — sondern
            - emphasis [ref=e87]: Stücke
            - text: ", jedes mit Herkunft, Charakter und einem kleinen Etikett."
          - paragraph [ref=e88]: "Was wir verkaufen, könnten wir auch selbst nie hergeben: rohe Bergkristalle aus den Alpen, Smaragde mit Geschichte, eine 380 Millionen Jahre alte Trilobitenplatte. Und ja — wir fassen das Beste davon auch in Gold."
    - region "Vier Welten unter einem Dach" [ref=e89]:
