          - emphasis [ref=e74]: das einzige Exemplar
          - text: seiner Art.
        - generic [ref=e75]:
          - paragraph [ref=e76]:
            - text: Inge Griss hat das Studio in einer Zeit gegründet, als Mineralogie noch Wunderkammer hieß. Diese Haltung haben wir nie verloren. Bei uns gibt es keine Ware von der Stange — sondern
            - emphasis [ref=e77]: Stücke
            - text: ", jedes mit Herkunft, Charakter und einem kleinen Etikett."
          - paragraph [ref=e78]: "Was wir verkaufen, könnten wir auch selbst nie hergeben: rohe Bergkristalle aus den Alpen, Smaragde mit Geschichte, eine 380 Millionen Jahre alte Trilobitenplatte. Und ja — wir fassen das Beste davon auch in Gold."
