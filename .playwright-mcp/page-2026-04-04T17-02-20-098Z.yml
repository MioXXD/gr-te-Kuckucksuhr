        - paragraph [ref=e209]: Der Gutausschank Stassen ist mehr als ein Weinlokal — er ist ein Stück Kiedrich.
        - paragraph [ref=e210]: "Inhaber Musli Ferizi führt den Betrieb mit Leidenschaft und dem Anspruch, jedem Gast das Gefühl zu geben: Hier bin ich willkommen. Der Ausschank in der Aulgasse ist seit Jahren ein vertrauter Ort für Einheimische und Gäste aus der gesamten Rheingau-Region."
        - paragraph [ref=e211]: Kiedrich — eines der schönsten Weindörfer des Rheingaus — bildet den perfekten Rahmen. Umgeben von Weinbergen, mittelalterlicher Architektur und dem unverwechselbaren Charme eines echten Dorflebens.
