          - heading "Vier Welten unter einem Dach" [level=2] [ref=e68]
          - paragraph [ref=e69]: Die meisten Juweliere kennen Gold. Wir kennen Gold und Silber — und das Gestein, aus dem die Erde gemacht ist. Vier Sammlungen, eine Adresse.
