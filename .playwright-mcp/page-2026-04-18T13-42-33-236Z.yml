        - emphasis [ref=e38]: Eine Haltung.
      - paragraph [ref=e39]: Dr. med. Astrid Thode und Dr. Malte-Christian Thode leiten das FOQUS Fellbach gemeinsam — mit einem Anspruch, der medizinische Präzision mit persönlicher Patientenbegleitung verbindet.
