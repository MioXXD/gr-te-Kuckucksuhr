        - generic [ref=e48]: Fachärztin für Dermatologie
        - generic [ref=e49]:
          - paragraph [ref=e50]: Schwerpunkte in allgemeiner und operativer Dermatologie, Hautkrebsvorsorge sowie ästhetischer Dermatologie. Die interdisziplinäre Zusammenarbeit mit der Augenheilkunde bildet für sie den Kern einer zeitgemäßen Facharztpraxis.
          - paragraph [ref=e51]: Der persönliche Zugang zu jedem Patienten — ohne Zeitdruck, mit Blick für das Ganze — ist für Dr. Astrid Thode kein Zusatz, sondern medizinische Grundvoraussetzung.
