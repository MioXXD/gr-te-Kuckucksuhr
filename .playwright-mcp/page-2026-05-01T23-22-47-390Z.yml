    - region "Wir behandeln jeden Stein, als wäre er das einzige Exemplar seiner Art." [ref=e26]:
      - generic [ref=e27]:
        - paragraph [ref=e29]: Manifest · 1979
        - heading "Wir behandeln jeden Stein, als wäre er das einzige Exemplar seiner Art." [level=2] [ref=e30]:
          - text: Wir behandeln jeden Stein, als wäre er
          - emphasis [ref=e31]: das einzige Exemplar
          - text: seiner Art.
        - generic [ref=e32]:
          - paragraph [ref=e33]:
            - text: Inge Griss hat das Studio in einer Zeit gegründet, als Mineralogie noch Wunderkammer hieß. Diese Haltung haben wir nie verloren. Bei uns gibt es keine Ware von der Stange — sondern
            - emphasis [ref=e34]: Stücke
            - text: ", jedes mit Herkunft, Charakter und einem kleinen Etikett."
          - paragraph [ref=e35]: "Was wir verkaufen, könnten wir auch selbst nie hergeben: rohe Bergkristalle aus den Alpen, Smaragde mit Geschichte, eine 380 Millionen Jahre alte Trilobitenplatte. Und ja — wir fassen das Beste davon auch in Gold."
    - region "Vier Welten unter einem Dach" [ref=e36]:
      - generic [ref=e37]:
        - generic [ref=e38]:
          - generic [ref=e39]: § I
          - heading "Vier Welten unter einem Dach" [level=2] [ref=e40]
          - paragraph [ref=e41]: Die meisten Juweliere kennen Gold. Wir kennen Gold und Silber — und das Gestein, aus dem die Erde gemacht ist. Vier Sammlungen, eine Adresse.
        - generic [ref=e42]:
          - article [ref=e43]:
            - generic [ref=e44]:
