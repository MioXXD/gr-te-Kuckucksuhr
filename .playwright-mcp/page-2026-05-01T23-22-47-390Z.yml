              - heading "Gold- & Silberschmuck" [level=3] [ref=e46]
            - figure [ref=e47]:
              - img "Goldschmuck auf Naturstein" [ref=e48]
            - paragraph [ref=e49]: Klassiker, Anfertigungen und ausgewählte Trauringe. Wir fassen Steine, ändern Erbstücke und arbeiten an eigenen Entwürfen — vom feinen Goldring bis zum schweren Silberanhänger.
            - list [ref=e50]:
              - listitem [ref=e51]: Anfertigung
              - listitem [ref=e52]: Trauringe
              - listitem [ref=e53]: Erbstück-Aufarbeitung
